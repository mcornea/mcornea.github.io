<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 345" font-family="monospace" font-size="13">
  <style>
    rect.vm { fill: #16213e; stroke: #4fc3f7; stroke-width: 1.5; rx: 5; }
    rect.device { fill: #0f3460; stroke: #81d4fa; stroke-width: 1; rx: 3; }
    rect.gpu { fill: #1b2838; stroke: #76ff03; stroke-width: 1.5; rx: 3; }
    text { fill: #e0e0e0; }
    text.title { font-size: 16px; font-weight: bold; fill: #ffffff; }
    text.label { font-size: 12px; fill: #b3e5fc; }
    text.device-text { font-size: 11px; fill: #e1f5fe; }
    text.small { font-size: 10px; fill: #90a4ae; }
    text.gpu-text { font-size: 11px; fill: #c8e6c9; }
    text.speed { font-size: 11px; fill: #ffcc02; font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="800" height="345" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text class="title" x="400" y="32" text-anchor="middle">GPUDirect RDMA on GeForce RTX 3090</text>
  <text class="small" x="400" y="50" text-anchor="middle">NIC-to-GPU direct DMA over PCIe, bypassing CPU memory</text>

  <!-- VM00 -->
  <rect class="vm" x="30" y="70" width="340" height="175"/>
  <text class="label" x="200" y="92" text-anchor="middle" font-weight="bold">vm00 (server)</text>

  <!-- VM00 GPU -->
  <rect class="gpu" x="55" y="110" width="120" height="70"/>
  <text class="gpu-text" x="115" y="132" text-anchor="middle" font-weight="bold">RTX 3090</text>
  <text class="gpu-text" x="115" y="147" text-anchor="middle">GPU 0</text>
  <text class="small" x="115" y="165" text-anchor="middle" fill="#a5d6a7">BAR1 memory</text>

  <!-- VM00 NIC -->
  <rect class="device" x="210" y="110" width="130" height="70"/>
  <text class="device-text" x="275" y="132" text-anchor="middle" font-weight="bold">ConnectX-4 Lx</text>
  <text class="device-text" x="275" y="147" text-anchor="middle">mlx5_0</text>
  <text class="small" x="275" y="165" text-anchor="middle">25GbE RoCEv2</text>

  <!-- VM00: GPUDirect path (NIC to GPU) - highlighted -->
  <line x1="210" y1="145" x2="175" y2="145" stroke="#76ff03" stroke-width="3"/>
  <polygon points="178,139 168,145 178,151" fill="#76ff03"/>

  <!-- VM00: PCIe label -->
  <text class="small" x="192" y="135" text-anchor="middle" fill="#76ff03">PCIe</text>

  <!-- VM00 nvidia-peermem -->
  <rect x="55" y="200" width="285" height="30" fill="#1a237e" stroke="#7c4dff" stroke-width="1" rx="3"/>
  <text x="197" y="220" text-anchor="middle" font-size="10" fill="#b388ff">nvidia-peermem + NV503C (ThirdPartyP2P)</text>

  <!-- VM00: NIC to peermem -->
  <line x1="275" y1="180" x2="275" y2="200" stroke="#7c4dff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="115" y1="180" x2="115" y2="200" stroke="#7c4dff" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- VM01 -->
  <rect class="vm" x="430" y="70" width="340" height="175"/>
  <text class="label" x="600" y="92" text-anchor="middle" font-weight="bold">vm01 (client)</text>

  <!-- VM01 GPU -->
  <rect class="gpu" x="625" y="110" width="120" height="70"/>
  <text class="gpu-text" x="685" y="132" text-anchor="middle" font-weight="bold">RTX 3090</text>
  <text class="gpu-text" x="685" y="147" text-anchor="middle">GPU 0</text>
  <text class="small" x="685" y="165" text-anchor="middle" fill="#a5d6a7">BAR1 memory</text>

  <!-- VM01 NIC -->
  <rect class="device" x="460" y="110" width="130" height="70"/>
  <text class="device-text" x="525" y="132" text-anchor="middle" font-weight="bold">ConnectX-4 Lx</text>
  <text class="device-text" x="525" y="147" text-anchor="middle">mlx5_0</text>
  <text class="small" x="525" y="165" text-anchor="middle">25GbE RoCEv2</text>

  <!-- VM01: GPUDirect path (NIC to GPU) - highlighted -->
  <line x1="590" y1="145" x2="628" y2="145" stroke="#76ff03" stroke-width="3"/>
  <polygon points="622,139 632,145 622,151" fill="#76ff03"/>

  <!-- VM01: PCIe label -->
  <text class="small" x="610" y="135" text-anchor="middle" fill="#76ff03">PCIe</text>

  <!-- VM01 nvidia-peermem -->
  <rect x="460" y="200" width="285" height="30" fill="#1a237e" stroke="#7c4dff" stroke-width="1" rx="3"/>
  <text x="602" y="220" text-anchor="middle" font-size="10" fill="#b388ff">nvidia-peermem + NV503C (ThirdPartyP2P)</text>

  <!-- VM01: NIC to peermem -->
  <line x1="525" y1="180" x2="525" y2="200" stroke="#7c4dff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="685" y1="180" x2="685" y2="200" stroke="#7c4dff" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 25GbE link between NICs -->
  <line x1="340" y1="145" x2="460" y2="145" stroke="#ffcc02" stroke-width="2.5"/>
  <polygon points="454,139 464,145 454,151" fill="#ffcc02"/>
  <polygon points="346,139 336,145 346,151" fill="#ffcc02"/>
  <text class="speed" x="400" y="138" text-anchor="middle">25GbE</text>
  <text class="small" x="400" y="161" text-anchor="middle" fill="#fff59d">RDMA Write</text>

  <!-- Bandwidth result -->
  <rect x="250" y="300" width="300" height="32" fill="#1b5e20" stroke="#66bb6a" stroke-width="1" rx="4"/>
  <text x="400" y="321" text-anchor="middle" font-size="12" fill="#c8e6c9" font-weight="bold">2922 MiB/s — full line rate</text>

  <!-- Legend -->
  <line x1="45" y1="320" x2="70" y2="320" stroke="#76ff03" stroke-width="3"/>
  <text class="small" x="75" y="324" fill="#a5d6a7">GPUDirect path</text>
</svg>
