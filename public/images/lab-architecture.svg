<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="monospace" font-size="13">
  <style>
    rect.host { fill: #1a1a2e; stroke: #e0e0e0; stroke-width: 2; rx: 6; }
    rect.vm { fill: #16213e; stroke: #4fc3f7; stroke-width: 1.5; rx: 4; }
    rect.device { fill: #0f3460; stroke: #81d4fa; stroke-width: 1; rx: 3; }
    rect.fiber { fill: #1b5e20; stroke: #66bb6a; stroke-width: 1; rx: 3; }
    text { fill: #e0e0e0; }
    text.title { font-size: 15px; font-weight: bold; fill: #ffffff; }
    text.subtitle { font-size: 12px; fill: #b0bec5; }
    text.label { font-size: 12px; fill: #b3e5fc; }
    text.device-text { font-size: 11px; fill: #e1f5fe; }
    text.small { font-size: 10px; fill: #90a4ae; }
    line.cable { stroke: #66bb6a; stroke-width: 2; }
    line.solid { stroke: #4fc3f7; stroke-width: 1.5; }
  </style>

  <!-- Host box -->
  <rect class="host" x="20" y="10" width="760" height="500"/>
  <text class="title" x="400" y="38" text-anchor="middle">Host: compute02 (AMD EPYC 7551P)</text>
  <text class="subtitle" x="400" y="56" text-anchor="middle">256GB DDR4 ECC — 4 NUMA Nodes</text>

  <!-- VM00 box -->
  <rect class="vm" x="50" y="75" width="340" height="280"/>
  <text class="label" x="220" y="97" text-anchor="middle" font-weight="bold">vm00</text>
  <text class="small" x="220" y="115" text-anchor="middle">vCPUs: NUMA 0+2</text>
  <text class="small" x="220" y="130" text-anchor="middle">RAM: 32GB (hugepages, pinned)</text>

  <!-- VM00 GPU -->
  <rect class="device" x="75" y="145" width="130" height="85"/>
  <text class="device-text" x="140" y="168" text-anchor="middle" font-weight="bold">RTX 3090</text>
  <text class="device-text" x="140" y="185" text-anchor="middle">GPU #0</text>
  <text class="small" x="140" y="200" text-anchor="middle">06:00.0 (VFIO)</text>
  <text class="small" x="140" y="214" text-anchor="middle">NUMA 0</text>

  <!-- VM00 NIC -->
  <rect class="device" x="225" y="145" width="130" height="85"/>
  <text class="device-text" x="290" y="168" text-anchor="middle" font-weight="bold">CX-4 Lx</text>
  <text class="device-text" x="290" y="185" text-anchor="middle">NIC #0 (PF)</text>
  <text class="small" x="290" y="200" text-anchor="middle">41:00.0 (VFIO)</text>
  <text class="small" x="290" y="214" text-anchor="middle">NUMA 2</text>

  <!-- VM00 RDMA IP -->
  <text class="small" x="220" y="260" text-anchor="middle">10.0.0.1/24</text>

  <!-- VM00 NIC connection line down to fiber -->
  <line class="solid" x1="290" y1="230" x2="290" y2="355"/>
  <line class="cable" x1="290" y1="355" x2="290" y2="410"/>

  <!-- VM01 box -->
  <rect class="vm" x="410" y="75" width="340" height="280"/>
  <text class="label" x="580" y="97" text-anchor="middle" font-weight="bold">vm01</text>
  <text class="small" x="580" y="115" text-anchor="middle">vCPUs: NUMA 1+3</text>
  <text class="small" x="580" y="130" text-anchor="middle">RAM: 32GB (hugepages, pinned)</text>

  <!-- VM01 GPU -->
  <rect class="device" x="435" y="145" width="130" height="85"/>
  <text class="device-text" x="500" y="168" text-anchor="middle" font-weight="bold">RTX 3090</text>
  <text class="device-text" x="500" y="185" text-anchor="middle">GPU #1</text>
  <text class="small" x="500" y="200" text-anchor="middle">21:00.0 (VFIO)</text>
  <text class="small" x="500" y="214" text-anchor="middle">NUMA 1</text>

  <!-- VM01 NIC -->
  <rect class="device" x="585" y="145" width="130" height="85"/>
  <text class="device-text" x="650" y="168" text-anchor="middle" font-weight="bold">CX-4 Lx</text>
  <text class="device-text" x="650" y="185" text-anchor="middle">NIC #1 (PF)</text>
  <text class="small" x="650" y="200" text-anchor="middle">61:00.0 (VFIO)</text>
  <text class="small" x="650" y="214" text-anchor="middle">NUMA 3</text>

  <!-- VM01 RDMA IP -->
  <text class="small" x="580" y="260" text-anchor="middle">10.0.0.2/24</text>

  <!-- VM01 NIC connection line down to fiber -->
  <line class="solid" x1="650" y1="230" x2="650" y2="355"/>
  <line class="cable" x1="650" y1="355" x2="650" y2="410"/>

  <!-- Fiber loopback box -->
  <rect class="fiber" x="325" y="395" width="240" height="35"/>
  <text class="device-text" x="445" y="417" text-anchor="middle" font-weight="bold" fill="#c8e6c9">Fiber Loopback</text>

  <!-- Fiber connections -->
  <line class="cable" x1="290" y1="412" x2="325" y2="412"/>
  <line class="cable" x1="565" y1="412" x2="650" y2="412"/>

  <!-- RDMA label -->
  <text class="label" x="400" y="460" text-anchor="middle" font-size="13" fill="#66bb6a">RDMA/RoCEv2 — 25 Gb/s</text>

  <!-- Host mgmt label -->
  <text class="small" x="70" y="400" text-anchor="start">Host mgmt:</text>
  <text class="small" x="70" y="415" text-anchor="start">cores 0-1, 30-31</text>
</svg>
